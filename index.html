<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>NADO Sizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #141414;
      --border: #2a2a2a;
      --text: #f5f5f5;
      --text-dim: #6b6b6b;
      --accent: #e63946;
      --accent-soft: rgba(230, 57, 70, 0.15);
      --green: #4ade80;
      --green-soft: rgba(74, 222, 128, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding: 20px 16px;
      padding-top: env(safe-area-inset-top, 20px);
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    .container {
      max-width: 380px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--text);
    }

    .header .subtitle {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
      letter-spacing: 1px;
    }

    .section {
      margin-bottom: 20px;
    }

    .section-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }

    .toggle-row {
      display: flex;
      gap: 8px;
    }

    .toggle-btn {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .toggle-btn.long.active {
      background: var(--green-soft);
      border-color: var(--green);
      color: var(--green);
    }

    .toggle-btn.short.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    .toggle-btn.order.active {
      background: var(--card);
      border-color: var(--text-dim);
      color: var(--text);
    }

    .input-row {
      display: flex;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 14px;
      margin-bottom: 10px;
      height: 50px;
    }

    .input-row:last-child {
      margin-bottom: 0;
    }

    .input-row label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      min-width: 80px;
    }

    .input-row input {
      flex: 1;
      background: transparent;
      border: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      text-align: right;
      outline: none;
    }

    .input-row input::placeholder {
      color: var(--text-dim);
      opacity: 0.4;
    }

    .input-row .unit {
      font-size: 11px;
      color: var(--text-dim);
      margin-left: 6px;
    }

    .fees-row {
      display: flex;
      gap: 8px;
    }

    .fees-row .input-row {
      flex: 1;
      padding: 0 10px;
    }

    .fees-row .input-row label {
      min-width: 50px;
      font-size: 10px;
    }

    .fees-row .input-row input {
      font-size: 14px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .result-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }

    .result-box.full {
      grid-column: 1 / -1;
    }

    .result-box .label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .result-box .value {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .result-box.highlight {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .result-box.highlight .value {
      color: var(--accent);
      font-size: 24px;
    }

    .result-box .value.warning {
      color: #fbbf24;
    }

    .result-box .value.danger {
      color: var(--accent);
    }

    .copy-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 1px;
    }

    .copy-btn:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .copy-btn.copied {
      background: var(--green);
    }

    .warning-box {
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      display: none;
    }

    .warning-box.visible {
      display: block;
    }

    .warning-box p {
      font-size: 11px;
      color: #fbbf24;
      line-height: 1.5;
    }

    .footer {
      text-align: center;
      margin-top: 28px;
    }

    .footer p {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>NADO SIZER</h1>
      <p class="subtitle">1% RISK · 10X · FEES INCLUDED</p>
    </div>

    <div class="section">
      <div class="section-label">Direction</div>
      <div class="toggle-row">
        <button class="toggle-btn long active" onclick="setDirection('long')">LONG</button>
        <button class="toggle-btn short" onclick="setDirection('short')">SHORT</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Order Type</div>
      <div class="toggle-row">
        <button class="toggle-btn order active" id="limitBtn" onclick="setOrderType('limit')">LIMIT</button>
        <button class="toggle-btn order" id="marketBtn" onclick="setOrderType('market')">MARKET</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Parameters</div>
      <div class="input-row">
        <label>Account</label>
        <input type="number" id="account" value="100000" inputmode="decimal" onclick="this.select()">
        <span class="unit">$</span>
      </div>
      <div class="input-row">
        <label>Entry</label>
        <input type="number" id="entry" placeholder="84500" inputmode="decimal" onclick="this.select()">
      </div>
      <div class="input-row">
        <label>Stop</label>
        <input type="number" id="stop" placeholder="83200" inputmode="decimal" onclick="this.select()">
      </div>
    </div>

    <div class="section">
      <div class="section-label">Fees</div>
      <div class="fees-row">
        <div class="input-row">
          <label>Maker</label>
          <input type="number" id="makerFee" value="0.01" step="0.001" inputmode="decimal" onclick="this.select()">
          <span class="unit">%</span>
        </div>
        <div class="input-row">
          <label>Taker</label>
          <input type="number" id="takerFee" value="0.035" step="0.001" inputmode="decimal" onclick="this.select()">
          <span class="unit">%</span>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="result-grid">
      <div class="result-box highlight full">
        <div class="label">Position Size</div>
        <div class="value" id="positionSize">—</div>
      </div>
      <div class="result-box">
        <div class="label">Contracts</div>
        <div class="value" id="contracts">—</div>
      </div>
      <div class="result-box">
        <div class="label">Margin</div>
        <div class="value" id="margin">—</div>
      </div>
      <div class="result-box">
        <div class="label">Risk</div>
        <div class="value" id="riskAmount">—</div>
      </div>
      <div class="result-box">
        <div class="label">Fees</div>
        <div class="value" id="fees">—</div>
      </div>
    </div>

    <button class="copy-btn" id="copyBtn" onclick="copyPosition()">COPY SIZE</button>

    <div class="warning-box" id="warningBox">
      <p>⚠️ Margin exceeds on-exchange balance ($21,498)</p>
    </div>

    <div class="footer">
      <p>MXN v1 2h/45m · NADO</p>
    </div>
  </div>

  <script>
    let direction = 'long';
    let orderType = 'limit';
    const ON_EXCHANGE_BALANCE = 21498;

    function setDirection(dir) {
      direction = dir;
      document.querySelectorAll('.toggle-btn.long, .toggle-btn.short').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.toggle-btn.${dir}`).classList.add('active');
      calculate();
    }

    function setOrderType(type) {
      orderType = type;
      document.getElementById('limitBtn').classList.toggle('active', type === 'limit');
      document.getElementById('marketBtn').classList.toggle('active', type === 'market');
      calculate();
    }

    function calculate() {
      const account = parseFloat(document.getElementById('account').value) || 0;
      const entry = parseFloat(document.getElementById('entry').value) || 0;
      const stop = parseFloat(document.getElementById('stop').value) || 0;
      const makerFee = (parseFloat(document.getElementById('makerFee').value) || 0) / 100;
      const takerFee = (parseFloat(document.getElementById('takerFee').value) || 0) / 100;

      if (!account || !entry || !stop) {
        resetResults();
        return;
      }

      if (direction === 'long' && stop >= entry) {
        resetResults();
        return;
      }
      if (direction === 'short' && stop <= entry) {
        resetResults();
        return;
      }

      const riskPercent = 0.01;
      const riskAmount = account * riskPercent;
      const leverage = 10;

      // Entry fee based on order type, exit always taker (stop loss)
      const entryFee = orderType === 'limit' ? makerFee : takerFee;
      const exitFee = takerFee;
      const totalFeeRate = entryFee + exitFee;

      const stopDistance = Math.abs(entry - stop);
      const stopPct = (stopDistance / entry) * 100;

      // Position = Risk / (stopDistance% + fees%)
      const positionSize = riskAmount / ((stopDistance / entry) + totalFeeRate);

      const contracts = positionSize / entry;
      const marginRequired = positionSize / leverage;
      const feesAmount = positionSize * totalFeeRate;

      document.getElementById('positionSize').textContent = '$' + formatNumber(positionSize);
      document.getElementById('contracts').textContent = contracts.toFixed(4);
      document.getElementById('margin').textContent = '$' + formatNumber(marginRequired);
      document.getElementById('riskAmount').textContent = '$' + formatNumber(riskAmount);
      document.getElementById('fees').textContent = '$' + formatNumber(feesAmount);

      const warningBox = document.getElementById('warningBox');
      const marginEl = document.getElementById('margin');

      if (marginRequired > ON_EXCHANGE_BALANCE) {
        warningBox.classList.add('visible');
        marginEl.classList.add('danger');
        marginEl.classList.remove('warning');
      } else if (marginRequired > ON_EXCHANGE_BALANCE * 0.8) {
        warningBox.classList.remove('visible');
        marginEl.classList.add('warning');
        marginEl.classList.remove('danger');
      } else {
        warningBox.classList.remove('visible');
        marginEl.classList.remove('warning', 'danger');
      }
    }

    function resetResults() {
      document.getElementById('positionSize').textContent = '—';
      document.getElementById('contracts').textContent = '—';
      document.getElementById('margin').textContent = '—';
      document.getElementById('riskAmount').textContent = '—';
      document.getElementById('fees').textContent = '—';
      document.getElementById('warningBox').classList.remove('visible');
    }

    function formatNumber(num) {
      if (num >= 1000) {
        return num.toLocaleString('en-US', { maximumFractionDigits: 0 });
      }
      return num.toLocaleString('en-US', { maximumFractionDigits: 2 });
    }

    function copyPosition() {
      const positionText = document.getElementById('positionSize').textContent;
      if (positionText === '—') return;

      const value = positionText.replace('$', '').replace(/,/g, '');
      navigator.clipboard.writeText(value).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'COPIED';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'COPY SIZE';
          btn.classList.remove('copied');
        }, 1200);
      });
    }

    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('input', calculate);
    });

    calculate();
  </script>
</body>
</html>
